<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Completion</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231a1d27'/%3E%3Crect x='18' y='7' width='2' height='13' rx='1' fill='%237c9ef8'/%3E%3Crect x='11' y='10' width='2' height='11' rx='1' fill='%237c9ef8'/%3E%3Crect x='11' y='7' width='9' height='3' rx='1.5' fill='%237c9ef8'/%3E%3Cellipse cx='12' cy='22' rx='3.5' ry='2.5' transform='rotate(-12 12 22)' fill='%237c9ef8'/%3E%3Cellipse cx='19' cy='21' rx='3.5' ry='2.5' transform='rotate(-12 19 21)' fill='%237c9ef8'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/common.css">
</head>
<body>

<div id="task-screen">
  <div class="task-top">
    <div class="task-main">

      <div class="task-header">
        <div class="task-title-block">
          <h2>Sentence Completion</h2>
          <p>Say the missing word to complete the sentence.</p>
        </div>
        <span class="sc-llm-badge sc-llm-off" id="sc-llm-badge" title="Loading…">…</span>
      </div>

      <div id="sc-setup">
        <div class="vf-setup-row">
          <div class="vf-field">
            <label class="vf-label">Category</label>
            <select id="sc-category" class="vf-select" onchange="onSCCategoryChange()">
              <option value="all">All</option>
              <!-- populated dynamically from server -->
            </select>
          </div>
        </div>
      </div>

      <div id="sc-card">
        <div id="sc-cat-badge"></div>
        <div id="sc-sentence"></div>
        <div id="sc-progress"></div>
      </div>

      <div class="record-row">
        <button class="record-btn idle" id="sc-btn" onclick="toggleSC()">
          <span class="pulse-dot"></span>
          <span id="sc-btn-label">Start Listening</span>
        </button>
        <button id="sc-skip-btn" class="hm-new-btn" onclick="scSkip()">Skip</button>
        <span id="sc-status"></span>
      </div>

      <div id="sc-feedback-zone" style="display:none">
        <canvas id="sc-particles" width="800" height="300"></canvas>
        <div id="sc-feedback-glow"></div>
        <div id="sc-feedback-inner">
          <div id="sc-result"></div>
          <div id="sc-explanation"></div>
          <div id="sc-heard"></div>
        </div>
      </div>

      <div id="sc-stats-row">
        <span class="sc-stat"><span id="sc-score">0</span> correct</span>
        <span class="sc-stat sc-stat-wrong"><span id="sc-wrong">0</span> wrong</span>
        <span class="sc-stat sc-stat-skip"><span id="sc-skipped">0</span> skipped</span>
      </div>

      <div id="sc-log" style="display:none">
        <div class="sc-log-title">Session Log</div>
        <table id="sc-log-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Sentence</th>
              <th>Heard</th>
              <th>Answer</th>
              <th>Result</th>
              <th>ms</th>
            </tr>
          </thead>
          <tbody id="sc-log-body"></tbody>
        </table>
      </div>

    </div><!-- /.task-main -->

    <nav id="sidebar">
      <div id="nav-user" class="nav-user-greeting"></div>
      <a class="sidebar-brand" href="/">Speech<br>Assessment</a>
      <a class="nav-item" id="nav-home" href="/">Menu</a>
      <a class="nav-sub" id="nav-ph" href="/sustained-phonation">Sustained Phonation</a>
      <a class="nav-sub" id="nav-pg" href="/pitch-glides">Pitch Glide</a>
      <a class="nav-sub" id="nav-rp" href="/reading-passage">Reading Passage</a>
      <a class="nav-sub" id="nav-hm" href="/hangman">Hangman</a>
      <a class="nav-sub" id="nav-vf" href="/verbal-fluency">Verbal Fluency</a>
      <a class="nav-sub" id="nav-sc" href="/sentence-completion">Sentence Completion</a>
    </nav>
    <script>(function(){var m={'/':'nav-home','/sustained-phonation':'nav-ph','/pitch-glides':'nav-pg','/reading-passage':'nav-rp','/hangman':'nav-hm','/verbal-fluency':'nav-vf','/sentence-completion':'nav-sc'};var el=document.getElementById(m[location.pathname]);if(el)el.classList.add('active');})();</script>
  </div><!-- /.task-top -->
</div><!-- /#task-screen -->

<script src="/static/sentence-completion.js"></script>
</body>
</html>
